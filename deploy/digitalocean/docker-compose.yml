services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pos
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Phnom_Penh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-upos_user", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  api:
    build:
      context: ../../api-v4
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pos
      DB_USERNAME: pos_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_TIMEZONE: Asia/Phnom_Penh
      FILE_BASE_URL: http://file:8080
      FILE_USERNAME: pos-file
      FILE_PASSWORD: ${FILE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JS_BASE_URL: http://report:5488
      JS_USERNAME: admin
      JS_PASSWORD: CamCyberTeam
      JS_TEMPLATE: invoice-main
      SMTP_PORT: 587
    depends_on:
      db:
        condition: service_healthy
      file:
        condition: service_started
      report:
        condition: service_started

  file:
    build:
      context: ../../file-v3
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pos
      DB_USERNAME: pos_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file-uploads:/app/public/uploads

  report:
    build:
      context: ../../report-v3
    restart: unless-stopped
    environment:
      PORT: 5488
    shm_size: 256m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - file
      - report

  api-tools:
    image: node:20-alpine
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - ../../api-v4:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pos
      DB_USERNAME: pos_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_TIMEZONE: Asia/Phnom_Penh
      FILE_BASE_URL: http://file:8080
      FILE_USERNAME: pos-file
      FILE_PASSWORD: ${FILE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JS_BASE_URL: http://report:5488
      JS_USERNAME: admin
      JS_PASSWORD: CamCyberTeam
      JS_TEMPLATE: invoice-main
    command: sh -c "npm ci && npm run migrate && npm run seeder"
    depends_on:
      db:
        condition: service_healthy

  file-tools:
    image: node:20-alpine
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - ../../file-v3:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pos
      DB_USERNAME: pos_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
    command: sh -c "npm ci && npm run migrate"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
  file-uploads:
  caddy-data:
  caddy-config:
